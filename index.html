<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>pet!tvoyou - creative lab</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Fraunces:ital,opsz,wght@0,9..144,400;1,9..144,500&display=swap" rel="stylesheet">
<style>
  :root {
    --pink: #EAB2C4;
    --pink-deep: #D48EA6;
    --pink-pale: #F3D3DE;
    --pcb: #1E4B39;
    --pcb-dark: #163826;
    --pcb-light: #2E6B4C;
    --gold: #CBA24C;
    --gold-bright: #E4C170;
    --silver: #C7CCD1;
    --silk: #EFEEE2;
    --chip: #17181A;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    background:
      repeating-linear-gradient(115deg, var(--pink) 0px, var(--pink) 2px, var(--pink-pale) 2px, var(--pink-pale) 3px),
      repeating-linear-gradient(115deg, transparent 0 18px, rgba(212,142,166,0.35) 18px 19px),
      linear-gradient(160deg, var(--pink-pale), var(--pink) 55%, var(--pink-deep));
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 8vh 5vw 10vh;
    font-family: 'Fraunces', serif;
    color: var(--pcb-dark);
    overflow-x: hidden;
  }

  .mono { font-family: 'Space Mono', monospace; }

  /* ---------------- the board ---------------- */

  .board-wrap {
    position: relative;
    max-width: 460px;
    width: 100%;
  }

  .board {
    position: relative;
    background: linear-gradient(155deg, var(--pcb-light), var(--pcb) 60%, var(--pcb-dark));
    border-radius: 6px;
    padding: 2.6rem 2rem 3.4rem;
    box-shadow:
      0 2px 0 rgba(255,255,255,0.06) inset,
      10px 14px 0 rgba(22,56,38,0.22),
      0 30px 50px -20px rgba(22,56,38,0.45);
    animation: settle 0.8s cubic-bezier(.2,.8,.2,1) both;
  }

  @keyframes settle {
    from { transform: translateY(-16px); opacity: 0; }
    to   { transform: translateY(0); opacity: 1; }
  }

  @media (prefers-reduced-motion: reduce) {
    .board, .pad::after, .chip-label { animation: none !important; }
  }

  /* faint copper trace lines etched into the board */
  .board::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 6px;
    background-image:
      linear-gradient(90deg, transparent 46%, rgba(203,162,76,0.16) 46% 47%, transparent 47%),
      linear-gradient(180deg, transparent 30%, rgba(203,162,76,0.13) 30% 31%, transparent 31%),
      linear-gradient(90deg, transparent 72%, rgba(203,162,76,0.13) 72% 73%, transparent 73%);
    pointer-events: none;
  }

  /* corner pads, like mounting/castellated pads */
  .pad {
    position: absolute;
    width: 15px; height: 15px;
    border-radius: 50%;
    background: radial-gradient(circle at 38% 32%, var(--gold-bright), var(--gold) 55%, #8a6d2c 100%);
    box-shadow: 0 1px 2px rgba(0,0,0,0.35);
  }
  .pad.tl { top: 12px; left: 12px; }
  .pad.tr { top: 12px; right: 12px; }
  .pad.bl { bottom: 12px; left: 12px; }
  .pad.br { bottom: 12px; right: 12px; }

  .ref-code {
    position: absolute;
    top: 16px; left: 38px;
    font-size: 0.62rem;
    letter-spacing: 0.06em;
    color: rgba(239,238,226,0.55);
  }

  .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 0.5em;
    font-size: 0.72rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--gold-bright);
    margin: 0 0 1.3rem;
  }

  h1 {
    margin: 0 0 0.2em;
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    font-size: clamp(2rem, 7.5vw, 2.9rem);
    letter-spacing: 0.01em;
    line-height: 1;
    color: var(--silk);
    text-shadow: 0 1px 0 rgba(0,0,0,0.25);
  }

  h1 .bang { color: var(--gold-bright); }

  .braille {
    font-size: 0.9rem;
    letter-spacing: 0.12em;
    color: rgba(239,238,226,0.5);
    margin: 0.4em 0 1.1em;
  }

  .role {
    display: inline-block;
    font-style: italic;
    font-weight: 500;
    font-size: 1.05rem;
    color: var(--pcb-dark);
    background: var(--silk);
    padding: 0.35em 0.9em;
    border-radius: 2px;
    margin: 0 0 1.7rem;
    transform: rotate(-1deg);
  }

  .bio {
    font-size: 0.98rem;
    line-height: 1.65;
    color: rgba(239,238,226,0.88);
    margin: 0 0 1rem;
    max-width: 34ch;
  }

  /* the little black IC - the seal of the page */
  .ic {
    position: relative;
    width: 74px; height: 54px;
    margin: 1.6rem 0 0.4rem;
    background: linear-gradient(160deg, #232427, var(--chip));
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 10px rgba(0,0,0,0.4);
  }

  .ic span { font-size: 1.4rem; filter: grayscale(0.15); }

  .ic .pin {
    position: absolute;
    width: 8px; height: 3px;
    background: var(--silver);
  }
  .ic .pin.l1 { left: -8px; top: 12px; }
  .ic .pin.l2 { left: -8px; top: 26px; }
  .ic .pin.l3 { left: -8px; top: 40px; }
  .ic .pin.r1 { right: -8px; top: 12px; }
  .ic .pin.r2 { right: -8px; top: 26px; }
  .ic .pin.r3 { right: -8px; top: 40px; }

  /* dangling connector, echoing the reference photo */
  .connector {
    position: absolute;
    bottom: -34px;
    left: 46px;
    width: 20px;
    height: 40px;
    background: linear-gradient(180deg, #262626, var(--chip));
    border-radius: 0 0 3px 3px;
  }
  .connector::before, .connector::after {
    content: "";
    position: absolute;
    top: -4px;
    width: 3px; height: 8px;
    background: var(--silver);
  }
  .connector::before { left: 4px; }
  .connector::after { right: 4px; }

  .solder {
    position: absolute;
    width: 9px; height: 9px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #fff, var(--silver) 45%, #7d838a 100%);
    opacity: 0.9;
  }

  /* ---------------- tags below board ---------------- */

  .notes {
    display: flex;
    flex-wrap: wrap;
    gap: 0.55rem;
    margin-top: 4.2rem;
    max-width: 460px;
    justify-content: center;
  }

  .note {
    font-family: 'Space Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    padding: 0.4em 0.75em;
    border: 1px solid var(--pcb-dark);
    background: var(--silk);
    color: var(--pcb-dark);
    border-radius: 2px;
    transform: rotate(var(--r, 0deg));
  }
  .note:nth-child(2n) { --r: 1.2deg; }
  .note:nth-child(3n) { --r: -1deg; }
  .note:nth-child(5n) { --r: 0.6deg; }

  .io {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-top: 1.3rem;
    max-width: 460px;
    justify-content: center;
  }

  .io-label {
    width: 100%;
    text-align: center;
    font-family: 'Space Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--pcb-dark);
    opacity: 0.55;
    margin-bottom: 0.3rem;
  }

  .port {
    display: inline-flex;
    align-items: center;
    font-family: 'Space Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    text-decoration: none;
    padding: 0.4em 0.75em;
    border-radius: 2px;
    background: var(--silk);
    color: var(--pcb-dark);
    border: 1px solid var(--pcb-dark);
    transform: rotate(var(--r, 0deg));
    transition: background 0.15s ease, color 0.15s ease;
  }

  .io .port:nth-child(2n) { --r: 1.2deg; }
  .io .port:nth-child(3n) { --r: -1deg; }
  .io .port:nth-child(5n) { --r: 0.6deg; }

  .port:hover, .port:focus-visible {
    background: var(--gold-bright);
    color: var(--pcb-dark);
  }

  footer {
    margin-top: 2.2rem;
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.05em;
    color: var(--pcb-dark);
    opacity: 0.65;
    text-align: center;
  }

  footer a {
    color: var(--pcb-dark);
    text-decoration: none;
    border-bottom: 1px dotted var(--pcb-dark);
  }

  a:focus-visible { outline: 2px solid var(--pcb-dark); outline-offset: 3px; }

  @media (max-width: 420px) {
    .board { padding: 2.2rem 1.5rem 3rem; }
  }
</style>
</head>
